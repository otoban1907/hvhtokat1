<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tokatlama Oyunu - Upgrade</title>
<style>
* { box-sizing: border-box; }
body {
  margin:0;
  min-height:100vh;
  background: radial-gradient(circle at top, #26313a, #080808 70%);
  color:white;
  font-family: Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  user-select:none;
}
.game {
  width:min(440px, 95vw);
  text-align:center;
}
h1 {
  margin:0 0 8px;
  font-size:32px;
  letter-spacing:1px;
  text-shadow:3px 3px 0 #000;
}
.top {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}
.box {
  background:#161616;
  border:2px solid #444;
  border-radius:13px;
  padding:8px 5px;
}
.label { font-size:11px; opacity:.75; }
.value { font-size:24px; font-weight:900; }
.stage {
  position:relative;
  border:4px solid #fff;
  border-radius:22px;
  overflow:hidden;
  background:#222;
  box-shadow:0 18px 45px rgba(0,0,0,.6);
  touch-action:none;
}
.stage img {
  width:100%;
  display:block;
  pointer-events:none;
  transition: transform .09s ease, filter .09s ease;
}
.stage.hit img {
  transform: translateX(12px) rotate(2.5deg) scale(1.02);
  filter: contrast(1.08) saturate(1.2);
}
.hand {
  position:absolute;
  left:50%;
  bottom:18px;
  font-size:76px;
  transform:translate(-50%,0) rotate(-22deg);
  cursor:grab;
  z-index:10;
  filter: drop-shadow(3px 6px 4px rgba(0,0,0,.65));
  touch-action:none;
}
.hand.dragging {
  cursor:grabbing;
  transform:translate(-50%,-50%) rotate(-28deg) scale(1.08);
}
.hand.slap {
  animation: slap .14s ease-out;
}
@keyframes slap {
  0% { transform:translate(-50%,-50%) rotate(-35deg) scale(1.25); }
  100% { transform:translate(-50%,-50%) rotate(-8deg) scale(.9); }
}
.mark {
  position:absolute;
  width:92px;
  height:92px;
  border-radius:50%;
  transform:translate(-50%,-50%) rotate(-15deg);
  pointer-events:none;
  z-index:7;
  animation: mark .65s ease-out forwards;
}
.mark:before {
  content:"✋";
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  font-size:70px;
  color:rgba(255,30,30,.65);
}
@keyframes mark {
  0% { opacity:0; transform:translate(-50%,-50%) rotate(-15deg) scale(.35); }
  20% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-50%) rotate(-15deg) scale(1.45); }
}
.pop {
  position:absolute;
  color:#fff;
  font-size:27px;
  font-weight:900;
  text-shadow:2px 2px 0 #000, -1px -1px 0 #000;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9;
  animation: pop .7s ease-out forwards;
}
@keyframes pop {
  0% { opacity:0; transform:translate(-50%,-25%) scale(.7); }
  18% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-130%) scale(1.18); }
}
.shake {
  animation: screenShake .14s linear;
}
@keyframes screenShake {
  0% { transform:translateX(0); }
  25% { transform:translateX(-5px); }
  50% { transform:translateX(5px); }
  75% { transform:translateX(-3px); }
  100% { transform:translateX(0); }
}
.controls {
  margin-top:11px;
  display:flex;
  gap:8px;
}
button {
  flex:1;
  padding:12px 8px;
  border:0;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  background:#ffd43b;
}
.hint {
  margin-top:9px;
  opacity:.78;
  font-size:13px;
  line-height:1.35;
}
</style>
</head>

<script>
let score = 0, combo = 0, timeLeft = 30, running = false;
let lastHit = 0, timer = null, dragging = false;
let pos = {x: 0, y: 0};

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const timeEl = document.getElementById("time");
const stage = document.getElementById("stage");
const hand = document.getElementById("hand");
const game = document.getElementById("game");

function update() {
  scoreEl.textContent = score;
  comboEl.textContent = combo + "x";
  timeEl.textContent = timeLeft;
}

function startGame() {
  score = 0; combo = 0; timeLeft = 30; running = true; lastHit = 0;
  clearInterval(timer);
  update();
  timer = setInterval(() => {
    timeLeft--;
    update();
    if (timeLeft <= 0) {
      running = false;
      clearInterval(timer);
      setTimeout(() => alert("Süre bitti! Skor: " + score), 120);
    }
  }, 1000);
}

function resetGame() {
  running = false;
  clearInterval(timer);
  score = 0; combo = 0; timeLeft = 30;
  hand.style.left = "50%";
  hand.style.top = "";
  hand.style.bottom = "18px";
  hand.classList.remove("dragging");
  update();
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(160, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.09);
  } catch(e) {}
}

function addMark(x, y) {
  const m = document.createElement("div");
  m.className = "mark";
  m.style.left = x + "px";
  m.style.top = y + "px";
  stage.appendChild(m);
  setTimeout(() => m.remove(), 700);
}

function addPop(x, y, text) {
  const p = document.createElement("div");
  p.className = "pop";
  p.style.left = x + "px";
  p.style.top = y + "px";
  p.textContent = text;
  stage.appendChild(p);
  setTimeout(() => p.remove(), 750);
}

function slap(x, y) {
  if (!running) startGame();

  const now = Date.now();
  combo = (now - lastHit < 650) ? combo + 1 : 1;
  lastHit = now;

  const gained = 10 + Math.min(combo * 3, 60);
  score += gained;

  stage.classList.add("hit");
  game.classList.add("shake");
  hand.classList.add("slap");
  setTimeout(() => {
    stage.classList.remove("hit");
    game.classList.remove("shake");
    hand.classList.remove("slap");
  }, 150);

  addMark(x, y);
  addPop(x, y, "+" + gained + (combo >= 4 ? " KOMBO!" : ""));
  beep();
  update();
}

hand.addEventListener("pointerdown", (e) => {
  dragging = true;
  hand.setPointerCapture(e.pointerId);
  hand.classList.add("dragging");
  const rect = stage.getBoundingClientRect();
  pos.x = e.clientX - rect.left;
  pos.y = e.clientY - rect.top;
  hand.style.bottom = "auto";
  hand.style.left = pos.x + "px";
  hand.style.top = pos.y + "px";
});

hand.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  const rect = stage.getBoundingClientRect();
  let x = Math.max(30, Math.min(e.clientX - rect.left, rect.width - 30));
  let y = Math.max(30, Math.min(e.clientY - rect.top, rect.height - 30));
  pos.x = x; pos.y = y;
  hand.style.left = x + "px";
  hand.style.top = y + "px";
});

hand.addEventListener("pointerup", (e) => {
  if (!dragging) return;
  dragging = false;
  hand.classList.remove("dragging");
  slap(pos.x, pos.y);
});

stage.addEventListener("pointerdown", (e) => {
  if (e.target === hand) return;
  const rect = stage.getBoundingClientRect();
  slap(e.clientX - rect.left, e.clientY - rect.top);
});

document.getElementById("start").addEventListener("click", startGame);
